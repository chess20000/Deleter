<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deleter — macOS 照片视频筛选器</title>
<meta name="description" content="Deleter 是一个 macOS 照片/视频筛选器：浏览目录、快速预览、标记丢弃，生成压缩副本后丢弃原片。">
<style>
  :root {
    --red: #b72b35;
    --red-bright: #d63a45;
    --bg: #0d0b0c;
    --bg-soft: #151112;
    --text: #f4eded;
    --muted: #9a8e8f;
    --border: rgba(255, 255, 255, 0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "PingFang SC", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 880px; margin: 0 auto; padding: 0 24px; }

  /* Hero */
  header.hero {
    min-height: 92vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: "";
    position: absolute;
    width: 640px; height: 640px;
    background: radial-gradient(circle, rgba(183, 43, 53, 0.28), transparent 65%);
    top: -180px; left: 50%; transform: translateX(-50%);
    filter: blur(20px);
    pointer-events: none;
  }
  .logo {
    width: 124px; height: 124px;
    margin-bottom: 28px;
    border-radius: 22%;
    box-shadow: 0 18px 48px rgba(183, 43, 53, 0.4);
    position: relative;
  }
  h1 {
    font-size: clamp(40px, 8vw, 68px);
    font-weight: 700;
    letter-spacing: -0.03em;
    margin-bottom: 14px;
    position: relative;
  }
  .tagline {
    font-size: clamp(17px, 2.4vw, 21px);
    color: var(--muted);
    max-width: 560px;
    margin-bottom: 38px;
    position: relative;
  }
  .cta { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; position: relative; }
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 28px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    text-decoration: none;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    border: 1px solid transparent;
  }
  .btn-primary {
    background: #fff;
    color: var(--red);
    box-shadow: 0 8px 24px rgba(183, 43, 53, 0.35);
  }
  .btn-primary:hover { background: #fff; color: var(--red-bright); transform: translateY(-2px); box-shadow: 0 12px 32px rgba(183, 43, 53, 0.5); }
  .btn-ghost {
    background: rgba(255, 255, 255, 0.04);
    color: var(--text);
    border-color: var(--border);
  }
  .btn-ghost:hover { background: rgba(255, 255, 255, 0.08); transform: translateY(-2px); }
  .btn svg { width: 19px; height: 19px; }
  .platform-note {
    margin-top: 18px;
    font-size: 13px;
    color: var(--muted);
    position: relative;
  }

  /* Install */
  section.install { padding: 56px 0 80px; text-align: center; }
  .install h2 { font-size: 26px; font-weight: 700; margin-bottom: 14px; }
  .install p { color: var(--muted); margin-bottom: 22px; }
  pre {
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    text-align: left;
    overflow-x: auto;
    font-size: 13px;
    color: #e0d4d5;
    font-family: "SF Mono", "Fira Code", Menlo, Consolas, monospace;
  }
  pre .c { color: var(--muted); }

  footer {
    border-top: 1px solid var(--border);
    padding: 28px 0;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }
  footer a { color: var(--muted); text-decoration: none; }
  footer a:hover { color: var(--text); }
</style>
</head>
